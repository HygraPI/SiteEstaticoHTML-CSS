<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../../css/login-cadastro.css">
</head>

<body>

<div class="container-login">

    <!-- LADO ESQUERDO (IMAGEM) -->
    <div class="esquerda-fundo"></div>

    <!-- LADO DIREITO (LOGIN) -->
    <div class="direita-form">
        <div class="caixa-login">

            <a href="../../index.html"><button class="btn-voltar">← Voltar</button></a>

            <img src="../../imagens/logo hygra.png" alt="Logo Hygra" class="logo-login">

            <h1>Faça o seu login</h1>

            <h4>Seu E-mail</h4>
            <input type="email" id="ipt_email" placeholder="Insira seu email...">

            <h4>Sua Senha</h4>
            <input type="password" id="ipt_senha" placeholder="Insira sua senha...">

            <button onclick="Login()">ENTRAR</button><br><br><br>

            Não tem uma conta? <a href="../cadastro/cadastro.html">Crie a sua conta Hygra</a>
            
        </div>
    </div>

</div>



</body>

</html>
<script>
    let tentativas = 0;

    function Login() {
        let email = ipt_email.value
        let senha = ipt_senha.value

        if (email == "admin@123" && senha == "12345") {
            alert("Login realizado com sucesso!")
            window.location.href = "../dashboard/dashboard.html";
        } else {
            tentativas = tentativas + 1;
            if (tentativas < 3) {
                alert("E-mail ou senha incorretos! Tentativa " + tentativas + " de 3")
            } else {
                alert("Você tentou muitas vezes. Acesso bloqueado!")
                ipt_email.disabled = true
                ipt_senha.disabled = true
            }
        }
    }
</script>
