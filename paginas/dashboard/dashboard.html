<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Dashboard</title>
</head>

<body class="corpodashboard">

    <header class="header">
        <div class="header-left">
            <img class="img-header" src="../../imagens/logo-sem-fundo.png">
            <h3 class="h3-header">Hygra</h3>
        </div>
        <h3 class="header-msg">Olá, <b>Admin</b>!</h3>

        <a href="../login/login.html"><button class="button-header">Voltar</button></a>

    </header>
    <div class="containerkpi">
        <div class="kpis">
            <div class="kpi">
                <p class="kpi_titulo"> Umidade Atual:</p>
                <h2 class="kpi_valor">43% </h2>
                <div class="kpi_legenda" style="color: green;">Ideal</div>
            </div>
            <div class="kpi">
                <p class="kpi_titulo"> Ultimo Alerta de Umidade:</p>
                <h2 class="kpi_valor"> há 4 dias </h2>
                <div class="kpi_legenda">12/04/2026</div>
            </div>
            <div class="kpi_destaque kpi">
                <p class="kpi_titulo"> Custo evitado:</p>
                <h2 class="kpi_valor"> R$13.000,00 </h2>

            </div>
            <div class="kpi">
                <p class="kpi_titulo"> Sensor em Alerta:</p>
                <h2 class="kpi_valor" style="color: rgb(168, 5, 5);"> 1-A</h2>

            </div>
        </div>
    </div>


    <select id="select_sensor" onchange="trocar_sensor()">
        <option value="0">Selecione um Sensor... </option>
        <option value="sensor1">Sensor 1A</option>
        <option value="sensor2">Sensor 1B</option>
        <option value="sensor3">Sensor 1C</option>

    </select>
    <div class="grafico">

        <div class="grafico_titulo">Umidade dos sensores</div>
        <canvas id="sensorDigital"></canvas>
    </div>

    <div class="graficoslinha">
        <div class="grafico">
            <div class="grafico_titulo">
                <p>Alertas por setor</p>
                <div>
                    <canvas id="sensorDigital2"></canvas>
                </div>
            </div>

        </div>

        <div class="grafico">
            <div class="grafico_titulo">
                <p>Tempo fora da faixa ideal</p>
                <div>
                    <canvas id="sensorDigital3"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>

        /*
        grafico.data.datasets[0].data = [];
        */
        var sensorDigital = new Chart(document.getElementById('sensorDigital').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Umidade',
                        borderColor: '#4e73df',
                        backgroundColor: 'rgba(78, 115, 223, 0.1)',
                        fill: true
                    },
                    {
                        label: 'Mínimo Ideal',
                        borderColor: '#f6c23e',
                        borderDash: [5, 5],
                        pointRadius: 0,
                    },
                    {
                        label: 'Máximo Ideal',
                        borderColor: '#e74a3b',
                        borderDash: [5, 5],
                        pointRadius: 0,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {

                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        beginAtZero: true
                    }
                }
            }
        });

        var sensorDigital2 = new Chart(document.getElementById('sensorDigital2').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['Setor1A', 'Setor1B', 'Setor1C', 'Setor2A', 'Setor2B'],
                datasets: [{
                    label: 'Alertas',
                    borderColor: '#63B1BC',
                    backgroundColor: '#BB0E22',
                    borderRadius: 20,
                    data: [3, 2, 10, 2, 0]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        beginAtZero: true
                    }
                }
            }
        });


        var sensorDigital3 = new Chart(document.getElementById('sensorDigital3').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['01/04/2026', '02/04/2026', '03/04/2026', '04/04/2026'],
                datasets: [{
                    label: 'Horas fora da faixa ideal de umidade',
                    borderColor: '#63B1BC',
                    backgroundColor: 'orange',
                    borderRadius: 20,
                    data: [2, 1, 4, 5, 2]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(Horas)'
                        },
                        beginAtZero: true
                    }
                }
            }
        });


        var paginacao = {};
        var tempo = {};

        let sensor_atual = '';

        function limparGrafico(grafico) {
            grafico.data.labels = [];

            grafico.data.datasets[0].data = [];
            grafico.data.datasets[1].data = [];
            grafico.data.datasets[2].data = [];

            grafico.update();

            contagem = 0;
        }

        function trocar_sensor() {
            let sensor_anterior = sensor_atual;
            sensor_atual = (select_sensor.value);
            if (sensor_atual != sensor_anterior) {
                limparGrafico(sensorDigital);
            }
        }

        setInterval(() => {
            obterDadosMock(sensorDigital);
        }, 1000);



        let contagem = 0;

        function obterDadosMock(grafico) {

            if (sensor_atual == '0' || sensor_atual == '') {
                return;
            }

            let valorMock = (Math.random() * 100).toFixed(0);
            contagem = contagem + 1;

            if (grafico.data.labels.length == 10) {
                grafico.data.labels.shift()
                grafico.data.datasets[0].data.shift()
            }

            grafico.data.labels.push(contagem);
            grafico.data.datasets[0].data.push(valorMock);


            grafico.data.datasets[1].data.push(45);
            grafico.data.datasets[2].data.push(55);

            grafico.update();
        }



    </script>
</body>

</html>
