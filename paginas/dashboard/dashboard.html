<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Dashboard</title>
</head>

<body class="corpodashboard">

    <header class="header">
        <div class="header-left">
            <img class="img-header" src="../../imagens/logo-sem-fundo.png">
            <h3 class="h3-header">Hygra</h3>
        </div>
    </header>
    <div class="containerkpi">
        <div class="kpis">
            <div class="kpi">
                <p class="kpi_titulo"> Umidade Atual:</p>
                <h2 class="kpi_valor">43% </h2>
            </div>
            <div class="kpi">
                <p class="kpi_titulo"> Ultimo Alerta de Umidade:</p>
                <h2 class="kpi_valor"> há 4 dias </h2>
            </div>
            <div class="kpi_destaque kpi">
                <p class="kpi_titulo"> Custo evitado:</p>
                <h2 class="kpi_valor"> R$13.000,00 </h2>
            </div>
            <div class="kpi">
                <p class="kpi_titulo"> Média semanal:</p>
                <h2 class="kpi_valor"> 38%</h2>
            </div>
        </div>
    </div>


    <select id="select_sensor" onchange="trocar_sensor()">
        <option value="0">Selecione um Sensor... </option>
        <option value="sensor1">Sensor 1A</option>
        <option value="sensor2">Sensor 1B</option>
        <option value="sensor3">Sensor 1C</option>

    </select>
    <div class="grafico">

        <div class="grafico_titulo">Umidade dos sensores</div>
        <canvas id="sensorDigital"></canvas>
    </div>

    <div class="graficoslinha">
        <div class="grafico">
            <div class="grafico_titulo">Alertas por setor</div>
            <canvas id="sensorDigital2"></canvas>
        </div>

        <div class="grafico">
            <div class="grafico_titulo">Tempo fora da faixa ideal</div>
            <canvas id="sensorDigital3"></canvas>
        </div>
    </div>

    <script>
        var sensorDigital = new Chart(document.getElementById('sensorDigital').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Umidade',
                    borderColor: '#4e73df',
                    backgroundColor: 'rgba(78, 115, 223, 0.1)',
                    fill: true
                },
                {
                    label: 'Mínimo Ideal',
                    borderColor: '#f6c23e',
                    borderDash: [5, 5],
                    pointRadius: 0
                },

                {
                    label: 'Máximo Ideal',
                    borderColor: '#e74a3b',
                    borderDash: [5, 5],
                    pointRadius: 0
                }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {

                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        beginAtZero: true
                    }
                }
            }
        });

        var sensorDigital2 = new Chart(document.getElementById('sensorDigital2').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['Setor1A', 'Setor1B', 'Setor1C', 'Setor2A', 'Setor2B'],
                datasets: [{
                    label: 'Alertas',
                    borderColor: '#63B1BC',
                    backgroundColor: '#BB0E22',
                    borderRadius: 6,
                    data: [3, 2, 10, 2, 0]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        beginAtZero: true
                    }
                }
            }
        });

        var sensorDigital3 = new Chart(document.getElementById('sensorDigital3').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['01/04/2026 | 1A', '02/04/2026 | 1A', '03/04/2026 | 1A', '04/04/2026 | 1A'],
                datasets: [{
                    label: 'tempo fora da faixa ideal de umidade por setor',
                    borderColor: '#63B1BC',
                    backgroundColor: '#267D39',
                    data: [2, 1, 4, 5, 2]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        title: {
                            display: true,
                            text: '(%)'
                        },
                        beginAtZero: true
                    }
                }
            }
        });


        var paginacao = {};
        var tempo = {};

        /*
        function obterDados(grafico, endpoint) {
            fetch('http://localhost:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }
                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }

                        grafico.data.labels.push(tempo[endpoint]++);
                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        grafico.update();
                    });
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }
        */


        let sensor_atual = '';

        function limparGrafico(grafico) {
            grafico.data.labels = [];

            grafico.data.datasets[0].data = [];
            grafico.data.datasets[1].data = [];
            grafico.data.datasets[2].data = [];

            grafico.update();

            contagem = 0;
        }

        function trocar_sensor() {
            let sensor_anterior = sensor_atual;
            sensor_atual = (select_sensor.value);
            if (sensor_atual != sensor_anterior) {
                limparGrafico(sensorDigital);
            }
        }

        setInterval(() => {
            obterDadosMock(sensorDigital);
        }, 1000);



        let contagem = 0;

        function obterDadosMock(grafico) {

            if (sensor_atual == '0' || sensor_atual == '') {
                return;
            }

            let valorMock = (Math.random() * 100).toFixed(0);
            contagem = contagem + 1;

            if (valorMock > 100) {
                valorMock == 100;
            }

            if (grafico.data.labels.length == 10) {
                grafico.data.labels.shift()
                grafico.data.datasets[0].data.shift()
            }

            grafico.data.labels.push(contagem);
            grafico.data.datasets[0].data.push(valorMock);
            grafico.update();

            grafico.data.datasets[1].data.push(45);
            grafico.data.datasets[2].data.push(55);

            if (grafico.data.datasets[1].data.length == 10) {
                grafico.data.datasets[1].data.shift();
                grafico.data.datasets[2].data.shift();
            }
        }



    </script>
</body>

</html>
