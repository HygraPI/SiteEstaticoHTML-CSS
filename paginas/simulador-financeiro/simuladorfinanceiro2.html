<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="padraosite.css">
    <title>Simulador Financeiro</title>
</head>

<body class="body">
    <header class="header">
        <div class="header-left">
            <img class="img-header" src="../../imagens/logo-sem-fundo.png">
            <h3 class="h3-header">Hygra</h3>
        </div>
        <a href="../login/login.html"><button class="button-header">Entrar</button></a>
    </header>

    <h1 class="titulo"> Simulador Financeiro - Hygra </h1> <br>
   <div class="corpo">
       <h2>Tipo de tecido: </h2>
       <select class="select" id="ipt_tipo">
        <option value="0">Selecione...</option>
        <option value="Algodão">Algodão</option>
        <option value="Seda">Seda</option>
        <option value="Linho">Linho</option>
        <option value="Lã">Lã</option>
       </select> <hr>
       <h2>Quantidade em Metros:</h2><br>
       <input class="input" type="number" id="ipt_qtd" placeholder="Ex: 50"> <br>
       <button class="botao" onclick="mostrar()">Analisar</button> <br>
       <div id="div_msg" style="display: flex; justify-content: center; align-items: center; flex-direction: column;"></div>
    </div>
</body>
<script>
    function mostrar() {
        let tipo = ipt_tipo.value;
        let qtd = Number(ipt_qtd.value);
        let qtd_perdida = 0;
        let porcentagem_perdida = 0;
        let perda_R$ = 0;
        /*Quando a umidade não é monitorada e considerada ideal:
        Algodão: 12% de taxa de perda/defeitos
        Seda: 15%
        Linho: 10%
        Lã: 9%
        */
        if (tipo == 0) {
            alert('Selecione um tecido')}
        else if ( qtd <= 0) {
            alert('Insira uma quantidade adotável')
            ipt_qtd.value='';
        }
        else {

            if (tipo == 'Algodão') {
                porcentagem_perdida = '12%'
                qtd_perdida = qtd * (12 / 100)
                perda_R$ = 25.00/*Custo médio do metro de algodão em pluma*/ * qtd_perdida;
            }
            else if (tipo == 'Seda') {
                porcentagem_perdida = '15%'
                qtd_perdida = qtd * (15 / 100)
                perda_R$ = 100.00/*Custo médio do metro de Seda*/ * qtd_perdida;
            }
            else if (tipo == 'Linho') {
                porcentagem_perdida = '10%'
                qtd_perdida = qtd * (10 / 100)
                perda_R$ = 70.00 /*Custo médio do metro de Linho*/ * qtd_perdida;
            }
            else if (tipo == 'Lã') {
                porcentagem_perdida = '9%'
                qtd_perdida = qtd * (9 / 100)
                perda_R$ = 140.00 /*Custo médio do metro de Lã Natural*/ * qtd_perdida;
            }
//             div_msg.innerHTML = `A ausência de controle adequado de umidade e temperatura pode comprometer diretamente a qualidade do tecido, favorecendo problemas como deterioração das fibras, surgimento de mofo e redução da durabilidade do material. <br> <br>
// Considerando o/a ${tipo} que está sendo armazenado/a, no pior dos cenários podem ocorrer perdas produtivas de até ${porcentagem_perdida}, ou seja, ${qtd_perdida.toFixed(2)}m do seu tecido. <br> <br>
// Atualmente, essa situação pode estar gerando uma perda estimada de R$${perda_R$.toFixed(2)}, afetando diretamente o seu faturamento e a eficiência da sua operação.<br> <br>
// Sem o monitoramento correto, essas condições tendem a se agravar, aumentando o desperdício e reduzindo a qualidade final do produto. <br>`
// esse era como estava antes

            //novo resultado
            div_msg.innerHTML = `
            <div class="div-resultado">
                <h3 class="h3-resultado">Resultado da Análise</h3>
                
                <p class="p-resultado">
                    <strong>Tecido:</strong> ${tipo}<br>
                    <strong>Quantidade:</strong> ${qtd}m
                </p>
                
                <p class="p-resultado">
                    <strong>Taxa de perda estimada:</strong> ${porcentagem_perdida}<br>
                    <strong>Quantidade danificada:</strong> ${qtd_perdida.toFixed(2)}m<br>
                    <strong style="color: #d63031; font-size: 18px;">Prejuízo: R$ ${perda_R$.toFixed(2)}</strong>
                </p>
                
                <p class="p-resultado-risco">
                    A falta de controle de umidade e temperatura causa deterioração das fibras, mofo e redução da durabilidade. Um monitoramento adequado previne essas perdas e protege seu faturamento.
                </p>
            </div>
            `

            ipt_qtd.value = '';
            ipt_tipo.value = '';
        }
    }
    /* Fontes:
    https://www.edgistify.com/resources/blogs/fabric-care-warehouse-humidity-control-natural-fibers
    https://www.tecidosnainternet.com.br/t/tecidos-de-puro-algodao
    https://bancodetecido.com.br/produto/bdt03-0665-cetim-de-seda-pura-pois-sob-tex/    
    https://www.maximustecidos.com.br/tecido-linho-puro-preto-100--linho-957/p
    https://www.palhadesedatecidos.com.br/index.php?route=product/category&path=383_782
    */
</script>

</html>
